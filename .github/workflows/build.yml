name: Build Nexo Executor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Clone ImGui
      run: git clone --branch docking --depth 1 https://github.com/ocornut/imgui.git third_party/imgui
    
    - name: Setup nlohmann/json
      shell: pwsh
      run: |
        $jsonDir = "third_party/nlohmann"
        New-Item -ItemType Directory -Path $jsonDir -Force | Out-Null
        $url = "https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp"
        $output = "$jsonDir/json.hpp"
        try {
          Invoke-WebRequest -Uri $url -OutFile $output -MaximumRedirection 5 -TimeoutSec 30
        } catch {
          Write-Host "Primary download failed, trying fallback..."
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/nlohmann/json/v3.11.3/single_include/nlohmann/json.hpp" -OutFile $output -TimeoutSec 30
        }
        if (-Not (Test-Path $output)) { throw "Failed to download json.hpp" }
        Write-Host "json.hpp downloaded successfully"
        Get-Item $output
    
    - name: Verify files exist
      shell: pwsh
      run: |
        if (-Not (Test-Path "third_party/imgui/imgui.cpp")) { throw "ImGui not found" }
        if (-Not (Test-Path "third_party/nlohmann/json.hpp")) { throw "json.hpp not found" }
        Write-Host "All dependencies present"
    
    - name: Configure CMake
      run: cmake -B build -A x64
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NexoExecutor-Release
        path: |
          build/bin/Release/Nexo.exe
          build/bin/Release/NexoCore.dll
        if-no-files-found: error
