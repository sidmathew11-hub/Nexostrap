name: Build Nexo Executor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Clone ImGui
      run: git clone --branch docking --depth 1 https://github.com/ocornut/imgui.git third_party/imgui
    
    - name: Setup nlohmann/json
      shell: cmd
      run: |
        if not exist third_party\nlohmann mkdir third_party\nlohmann
        curl -L -o third_party\nlohmann\json.hpp https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp
        if not exist third_party\nlohmann\json.hpp exit 1
        dir third_party\nlohmann\json.hpp
    
    - name: Configure CMake
      run: cmake -B build -A x64
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NexoExecutor-Release
        path: |
          build/bin/Release/Nexo.exe
          build/bin/Release/NexoCore.dll
        if-no-files-found: error
