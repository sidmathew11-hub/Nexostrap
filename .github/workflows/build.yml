name: Build Nexo Executor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Clone ImGui
      run: git clone --branch docking --depth 1 https://github.com/ocornut/imgui.git third_party/imgui
    
    - name: Download nlohmann/json
      run: |
        New-Item -ItemType Directory -Path "third_party/nlohmann" -Force
        $url = "https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp"
        $output = "third_party/nlohmann/json.hpp"
        Invoke-WebRequest -Uri $url -OutFile $output -MaximumRedirection 5
        if (-Not (Test-Path $output)) { throw "Failed to download json.hpp" }
        Write-Host "json.hpp downloaded successfully"
        Get-Item $output
    
    - name: Configure CMake
      run: cmake -B build -A x64
    
    - name: Build
      run: cmake --build build --config Release
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NexoExecutor-Release
        path: |
          build/bin/Release/Nexo.exe
          build/bin/Release/NexoCore.dll
        if-no-files-found: warn
